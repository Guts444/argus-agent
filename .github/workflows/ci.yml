name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore Argus.slnx
      - run: dotnet build Argus.slnx -c Release --no-restore
      - run: dotnet test Argus.slnx -c Release --no-build
